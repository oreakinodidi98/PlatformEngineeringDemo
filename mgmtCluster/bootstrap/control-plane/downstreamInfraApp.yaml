apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: downstream-infra
    namespace: argocd
    finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
    project: default
    source:    
        repoURL: https://github.com/oreakinodidi98/PlatformEngineeringDemo
        targetRevision: HEAD
        path: downstreamInfra/testcluster/         
    syncPolicy:
        automated: {}
        syncOptions:
        - SkipDryRunOnMissingResource=true
    destination:
        namespace: argocd
        server: https://kubernetes.default.svc
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: team01-claims
    namespace: argocd
    finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
    project: default
    source:
        repoURL: https://github.com/oreakinodidi98/PlatformEngineeringDemo
        targetRevision: HEAD
        path: downstreamInfra/team01/
    syncPolicy:
        automated: {}
        syncOptions:
        - SkipDryRunOnMissingResource=true
    destination:
        namespace: argocd
        server: https://kubernetes.default.svc