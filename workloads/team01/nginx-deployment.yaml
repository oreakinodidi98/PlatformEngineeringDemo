apiVersion: apps/v1
kind: Deployment
metadata:
  name: team01-nginx
  namespace: team01
spec:
  replicas: 1
  selector:
    matchLabels:
      app: team01-nginx
  template:
    metadata:
      labels:
        app: team01-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: team01-nginx
  namespace: team01
spec:
  selector:
    app: team01-nginx
  ports:
    - port: 80
      targetPort: 80
